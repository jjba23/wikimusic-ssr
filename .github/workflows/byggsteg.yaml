name: Byggsteg
on:
  push:
    branches:
      - trunk
  pull_request:
    types: []

jobs:
  byggsteg:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job deploy at byggsteg
        run: |
           curl 'https://byggsteg.jointhefreeworld.org/api/jobs/submit' \
               -X POST -H 'Content-Type: application/x-www-form-urlencoded' \
               -H 'Authorization: Basic ${{secrets.BYGGSTEG_KEY}}' \
               --data-raw 'project=wikimusic-ssr&clone-url=https%3A%2F%2Fgithub.com%2Fjjba23%2Fwikimusic-ssr&branch-name=trunk&task=pull-and-restart'
               
