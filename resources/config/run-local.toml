[servant]
port = 6923
host = "127.0.0.1"

[cors]
origins = [ "http://127.0.0.1:6923" ]
methods = [ "OPTIONS", "HEAD", "POST", "GET" ]
request-headers = [ "content-type", "access-control-allow-origin", "cookie" ]

[web-frontend]
base-url = "http://127.0.0.1:6923"

[dev]
reported-version = "dev"

[cookie]
same-site = "SameSiteLax"
secure = false
max-age = 31104000 # 1 year
path = "/"
domain = "127.0.0.1"

[api]
host = "127.0.0.1"
port = 50050
protocol = "http"
